<div class="popup" id="question_form" style="display: none">
	<div class="h2">Задать вопрос священнику</div>
	<div class="contact_form_container">
		<form action="" method="post" name="contacts-father" class="boar-sender">
            <input type="hidden" name="boar-subject" value="Задать вопрос священнику">
        	<div class="row">
        		<div class="col-12" style="margin: 0 0 20px 0;">
                    <div class="float-field">
                        <input type="text" class="form_input" name="name[]" data-ru-name="Имя" placeholder=" " data-required="1">
                        <label for="question_form_name">Ваше имя</label>
                    </div>
        		</div>
        		<div class="col-12" style="margin: 0 0 20px 0;">
                    <div class="float-field">
                        <input type="text" class="form_input" name="name[]" data-ru-name="Телефон" placeholder=" " data-required="1">
                        <label for="question_form_phone">Ваш телефон</label>
        			</div>
        		</div>
        		<div class="col-12" style="margin: 0 0 20px 0;">
                    <div class="float-field">
                        <input type="text" class="form_input" name="name[]" data-ru-name="Email" placeholder=" " data-required="1">
                        <label for="question_form_email">Ваш email</label>
                    </div>
        		</div>
        		<div class="col-12" style="margin: 0 0 20px 0;">
                    <div class="float-field">
                        <textarea type="text" class="form_input form_textarea" name="name[]" data-ru-name="Обращение" placeholder=" " data-required="1"></textarea>
                        <label for="question_form_message">Обращение</label>
                    </div>
        		</div>
        		<div class="col-12"><button type="submit" class="form_submit_button">Задать вопрос</button></div>
        	</div>
        </form>
	</div>
</div>
